<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BLKOWNED · Board Strategy 2026–2028</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0D0D0D;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;color:#F0F0F0}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px}
input[type=range]{cursor:pointer;width:100%;accent-color:#C9A84C}
@media(max-width:768px){.sidebar{display:none}.main-content{margin-left:0!important}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;
const G="#C9A84C",N="#1B2B4B",M="#4A5568",L="#EFF3F8",W="#FFFFFF",LG="#D9E2ED";

const sections = [
  {id:"overview",label:"Overview"},
  {id:"grants",label:"Grant Strategy"},
  {id:"programs",label:"Program Strategy"},
  {id:"earnedrev",label:"Earned Revenue"},
  {id:"platform",label:"Community Platform 2.0"},
  {id:"resourcing",label:"Resourcing"},
  {id:"partnerships",label:"Partnerships"},
  {id:"financial",label:"Financial Infrastructure"},
  {id:"roadmap",label:"24-Month Roadmap"},
];

function Tag({children,color="#C9A84C",bg="rgba(201,168,76,0.12)"}) {
  return <span style={{fontSize:10,fontWeight:700,letterSpacing:1,color,background:bg,border:`1px solid ${color}`,borderRadius:20,padding:"2px 10px",whiteSpace:"nowrap"}}>{children}</span>;
}
function SectionTitle({children}) {
  return <div style={{marginBottom:20}}>
    <div style={{fontSize:22,fontWeight:800,color:"#EEE",marginBottom:8}}>{children}</div>
    <div style={{height:3,width:60,background:G,borderRadius:2}}/>
  </div>;
}
function SubTitle({children,color=G}) {
  return <div style={{fontSize:15,fontWeight:700,color,marginTop:20,marginBottom:8}}>{children}</div>;
}
function Body({children}) {
  return <p style={{fontSize:13,color:"#B0B0C8",lineHeight:1.7,marginBottom:12}}>{children}</p>;
}
function Bullet({children,bold=false}) {
  return <div style={{display:"flex",gap:8,marginBottom:6,alignItems:"flex-start"}}>
    <span style={{color:G,fontSize:11,marginTop:3,minWidth:8}}>▸</span>
    <span style={{fontSize:13,color:bold?"#EEE":M,lineHeight:1.5,fontWeight:bold?700:400}}>{children}</span>
  </div>;
}
function Card({children,style={}}) {
  return <div style={{background:"#141414",border:"1px solid #222",borderRadius:12,padding:18,marginBottom:12,...style}}>{children}</div>;
}
function Row({items}) {
  return <div style={{display:"grid",gridTemplateColumns:`repeat(${items.length},1fr)`,gap:10,marginBottom:12}}>
    {items.map((it,i)=><div key={i} style={{background:"#0D0D0D",borderRadius:10,padding:"14px 12px",textAlign:"center",border:"1px solid #1e1e1e"}}>
      <div style={{fontSize:20,fontWeight:800,color:it.color||G}}>{it.val}</div>
      <div style={{fontSize:11,color:"#555",marginTop:4}}>{it.label}</div>
    </div>)}
  </div>;
}
function GTable({headers,rows,shade=true}) {
  return <div style={{borderRadius:10,overflow:"hidden",marginBottom:16}}>
    <div style={{display:"grid",gridTemplateColumns:headers.map(h=>h.w||"1fr").join(" "),background:N,borderBottom:"1px solid #263D6B"}}>
      {headers.map((h,i)=><div key={i} style={{padding:"10px 12px",fontSize:11,fontWeight:700,color:G,letterSpacing:1}}>{h.label}</div>)}
    </div>
    {rows.map((row,ri)=><div key={ri} style={{display:"grid",gridTemplateColumns:headers.map(h=>h.w||"1fr").join(" "),background:shade&&ri%2===0?"#111":"transparent",borderBottom:"1px solid #1a1a1a"}}>
      {row.map((cell,ci)=><div key={ci} style={{padding:"9px 12px",fontSize:12,color:ci===0?"#DDD":M,fontWeight:ci===0?600:400,lineHeight:1.4}}>{cell}</div>)}
    </div>)}
  </div>;
}

// ── SECTIONS ─────────────────────────────────────────────────────────

function Overview() {
  return <div>
    <div style={{background:"linear-gradient(135deg,#1B2B4B,#0D1a2a)",border:"1px solid #C9A84C",borderRadius:14,padding:22,marginBottom:24}}>
      <div style={{fontSize:11,color:"#C9A84C",fontWeight:700,letterSpacing:2,marginBottom:10}}>START HERE</div>
      <div style={{fontSize:17,fontWeight:800,color:"#EEE",marginBottom:12}}>What this is and how to use it</div>
      <div style={{fontSize:13,color:"#B0C0D8",lineHeight:1.7,marginBottom:12}}>This site is a strategic reference document for the BLKOWNED board, covering everything the organisation needs to grow and sustain itself over the next two years. It covers four connected areas: how to pursue grants, how to run our programs, how to generate revenue without relying only on grants, and how to build the right partnerships. Each section has its own page — use the menu on the left to navigate.</div>
      <div style={{fontSize:13,color:"#B0C0D8",lineHeight:1.7,marginBottom:12}}>You do not need to read this all at once. If you are short on time, start with the Overview (you are here), then jump to whichever section is most relevant to what you are working on. Every section is written in plain language and explains the reasoning behind each recommendation, not just the recommendation itself.</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginTop:4}}>
        {[
          {t:"Most urgent action",d:"Apply to the Black Opportunity Fund and OTF Seed Grant to fund a part-time Grants Coordinator. This one hire unlocks everything else."},
          {t:"Most important decision",d:"Should the Community Platform be built custom by the MBA students, or built on Slack and Claude? The board needs to decide this before development goes further."},
          {t:"Biggest opportunity",d:"AI for All, Canada’s new national AI strategy, creates direct funding pathways for exactly what BLKOWNED does. The window to position for that funding is now."},
        ].map((s,i)=><div key={i} style={{background:"rgba(0,0,0,0.3)",borderRadius:8,padding:12}}>
          <div style={{fontSize:11,color:"#C9A84C",fontWeight:700,marginBottom:4}}>{s.t.toUpperCase()}</div>
          <div style={{fontSize:12,color:"#8090A8",lineHeight:1.5}}>{s.d}</div>
        </div>)}
      </div>
    </div>

    <SectionTitle>The Integrated Strategy</SectionTitle>
    <Body>This document covers all nine dimensions of BLKOWNED's organisational strategy for 2026–2028. The four strategies — grants, programs, resourcing, and partnerships — are not parallel tracks. They form a single flywheel: a stronger program generates better outcomes data, which strengthens grant applications, which delivers more funding, which enables better resourcing, which deepens partnerships, which strengthens the program further.</Body>
    <Body>The bottleneck in the flywheel is always the same: organisational capacity. BLKOWNED has the community authenticity, the program track record, and now the evidence-based model. What hasn't yet kept pace is the administrative infrastructure that makes the flywheel self-sustaining. This strategy is designed to close that gap methodically.</Body>

    <Row items={[
      {val:"175+",label:"Businesses Supported",color:G},
      {val:"280",label:"Community Members",color:G},
      {val:"9,000+",label:"Supporter Network",color:G},
      {val:"4 Years",label:"Trailblazer Track Record",color:G},
    ]}/>

    <Card style={{background:"linear-gradient(135deg,#0D0D0D,#0D1a0D)",border:"1px solid #2a3a2a",marginBottom:16}}>
      <div style={{fontSize:10,color:"#4CAF50",fontWeight:700,letterSpacing:2,marginBottom:6}}>EXTERNAL VALIDATION — RUFFOLO + MURCHISON, JULY 14 2026</div>
      <Body>John Ruffolo (Maverix Private Equity, formerly OMERS Ventures) and Michael Murchison (founder of Ada) published a critique of AI for All that sharpens the case for BLKOWNED's approach. Key findings: SME AI adoption in Canada sits at 8%, not 12%. Nordic front-runners are already at 29 to 42 per cent. Germany is at 26, France at 18. Canada is not closing the gap — it risks codifying it. Among Black-owned SMEs, the adoption gap is almost certainly wider still. This is the precise problem BLKOWNED exists to solve, and it is now documented by Canada's most prominent tech capital allocators.</Body>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
        {[
          {val:"8%",label:"Canadian SME AI adoption",color:"#FF6B6B"},
          {val:"29–42%",label:"Nordic SME front-runners",color:"#4CAF50"},
          {val:"26%",label:"Germany SME adoption",color:"#7C9FFF"},
          {val:"60%",label:"Canada's 2034 target",color:G},
        ].map((s,i)=><div key={i} style={{background:"#0D0D0D",borderRadius:8,padding:"10px 10px",textAlign:"center",border:"1px solid #1a2a1a"}}>
          <div style={{fontSize:18,fontWeight:800,color:s.color}}>{s.val}</div>
          <div style={{fontSize:10,color:"#555",marginTop:3}}>{s.label}</div>
        </div>)}
      </div>
    </Card>

    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
      {[
        {n:"01",t:"Grant Strategy",d:"Portfolio, sequencing, stacking across 3 tiers"},
        {n:"02",t:"Program Strategy",d:"4-rung ladder anchored by the Trailblazer Residency"},
        {n:"03",t:"Earned Revenue",d:"ERG events, directory monetisation, supply chain"},
        {n:"04",t:"Community Platform",d:"McMaster MBA upgrade, Slack + AI, subscription model"},
        {n:"05",t:"Resourcing",d:"3-phase staffing plan funded by grants"},
        {n:"06",t:"Partnerships",d:"Academic, corporate, government, and ecosystem tiers"},
      ].map((s,i)=><div key={i} style={{background:N,borderRadius:10,padding:16}}>
        <div style={{fontSize:22,fontWeight:900,color:G,marginBottom:4}}>{s.n}</div>
        <div style={{fontSize:13,fontWeight:700,color:"#EEE",marginBottom:4}}>{s.t}</div>
        <div style={{fontSize:11,color:"#7A8FAA"}}>{s.d}</div>
      </div>)}
    </div>

    <Card style={{borderLeft:`3px solid ${G}`}}>
      <SubTitle children="The Organising Thesis"/>
      <Body>BLKOWNED doesn't train Black entrepreneurs. We build alongside them — with the mentors, the AI tools, and the community infrastructure they needed years ago but couldn't access. By the time a Trailblazer Resident graduates, their business already runs differently than when they arrived. That's not a course completion. That's a transformation.</Body>
    </Card>
  </div>;
}

function Grants() {
  return <div>
    <SectionTitle>Grant Strategy</SectionTitle>
    <Body>Stop treating grants as individual applications. Start treating the grant portfolio as an interconnected funding system with three tiers, each serving a different purpose and operating on a different timeline.</Body>

    <SubTitle>The Three-Tier Portfolio</SubTitle>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:20}}>
      {[
        {tier:"Tier 1",name:"Capacity Grants",ex:"OTF, BOF, Salesforce.org",purpose:"Fund BLKOWNED's ability to operate and grow. Pay for staff, systems, and infrastructure. Unrestricted or lightly restricted.",amount:"$50K–$600K/yr",color:"#4CAF50"},
        {tier:"Tier 2",name:"Program Delivery",ex:"BEP, CanCode, AI for All, FedDev",purpose:"Fund the Trailblazer Residency and AI literacy programming directly. Outcome-tied — require measurable results reported against milestones.",amount:"$125K–$3M/project",color:G},
        {tier:"Tier 3",name:"Research Grants",ex:"SSHRC via McMaster",purpose:"Fund the evidence base that makes BLKOWNED fundable at higher levels. Almost no Black entrepreneurship program accesses this — and it generates publishable data.",amount:"$25K–$200K/yr",color:"#7C9FFF"},
      ].map((t,i)=><div key={i} style={{background:"#141414",border:`1px solid #222`,borderTop:`3px solid ${t.color}`,borderRadius:12,padding:16}}>
        <div style={{fontSize:10,color:t.color,letterSpacing:1,fontWeight:700,marginBottom:4}}>{t.tier}</div>
        <div style={{fontSize:14,fontWeight:700,color:"#EEE",marginBottom:4}}>{t.name}</div>
        <div style={{fontSize:11,color:"#555",marginBottom:8,fontStyle:"italic"}}>{t.ex}</div>
        <div style={{fontSize:12,color:M,lineHeight:1.5,marginBottom:10}}>{t.purpose}</div>
        <div style={{fontSize:14,fontWeight:700,color:t.color}}>{t.amount}</div>
      </div>)}
    </div>

    <SubTitle>Active Grant Portfolio</SubTitle>
    <GTable
      headers={[{label:"PROGRAM",w:"2fr"},{label:"AMOUNT",w:"1fr"},{label:"STATUS",w:"1fr"},{label:"FIT",w:"2.5fr"}]}
      rows={[
        ["Claude Corps — Anthropic","$10K grant + free AI fellow","Deadline passed — next cohort TBC","BLKOWNED did not apply for Cohort 1. Monitor Anthropic for January 2027 cohort opening. Still pursue Claude for Nonprofits 75% discount immediately."],
        ["Black Opportunity Fund","$25K–$100K","OPEN NOW","Funds incubator/accelerator programs for Black entrepreneurs — direct residency fit"],
        ["Claude for Nonprofits","75% discount","OPEN NOW","Foundational AI infrastructure. Required before any AI-related grant application."],
        ["OTF Grow Grant","$100K–$600K / 2-3 yrs","Fall 2026","4-year track record + residency model meets 'established program expanding impact' criteria"],
        ["Canada Summer Jobs","Up to 100% min. wage","Annual","Funds coordinator/junior AI role — reduces Ashleigh's operational burden"],
        ["BEP Ecosystem Fund (next round)","$125K–$3M","Monitor — coming","THE primary Tier 2 target. Validated application + new model + consortium = stronger bid"],
        ["CanCode Successor Round","$30M pool","Monitor — coming","$30M committed in AI for All for AI/digital skills. Apply with consortium."],
        ["AI for All — AI Literacy Initiative","TBD (large)","6–18 months","Consortium-led. BLKOWNED as equity-delivery partner with McMaster/Mohawk/Brock/Guelph."],
        ["FedDev RAII — Next Intake","$250K–$5M","Monitor — coming","$500M national commitment through AI for All. SME AI adoption with McMaster."],
        ["SSHRC Partnership Engage","Up to $25K","Aug/Nov 2026","Entry-level research grant via McMaster. Launches the Tier 3 evidence track."],
        ["Salesforce.org","Varies","Ongoing","Convert existing sponsorship into formal grant. Workforce development + social impact streams."],
      ]}
    />

    <SubTitle>The Four Non-Negotiable Grant Rules</SubTitle>
    <Bullet bold>Never apply for a grant you are not ready to report against. One late report costs the entire funder relationship.</Bullet>
    <Bullet>Every application references the impact report, the theory of change, and the McMaster letter of support. These three do the credibility work so the program description can do the differentiation work.</Bullet>
    <Bullet>Maintain a shared grant calendar with application deadlines, reporting deadlines, and renewal windows. Missed windows are forfeited money.</Bullet>
    <Bullet>The Federation of Black Canadians publishes a monthly grant list. Someone reads it the day it publishes. No exceptions.</Bullet>

    <SubTitle>The Ruffolo Doctrine — How to Think About Grants Strategically</SubTitle>
    <Card style={{background:"linear-gradient(135deg,#0D0D0D,#1a0D0D)",border:"1px solid #3a2020"}}>
      <Body>John Ruffolo and Michael Murchison published a direct critique of AI for All on July 14, 2026, that every BLKOWNED grant decision should be filtered through. Three arguments with direct application to our strategy:</Body>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:0}}>
        {[
          {t:"Lead with procurement, not grants",d:"Grants create dependency and reward grant-writing. Procurement creates markets and rewards results. Government is the largest buyer — its purchasing power scales organisations faster than any cheque. BLKOWNED's ERG event management contracts and Supplier Pipeline Partnerships are the implementation of this thesis.",color:"#FF6B6B"},
          {t:"Avoid the alphabet soup",d:"Ottawa is accumulating an impressive number of funding vehicles. More funds are not the same as more outcomes. Each adds its own application process and reporting burden. BLKOWNED's focused grant strategy — BEP, OTF, CanCode, AI for All — is deliberately narrow. Chasing every new envelope that gets announced is a capacity trap.",color:G},
          {t:"Focus is the competitive advantage",d:"Six pillars and dozens of initiatives signal comprehensiveness, but comprehensiveness shades into a lack of focus. A plan that promises everything risks delivering nothing at scale. BLKOWNED pitches AI for All on two pillars only: AI literacy for under-represented communities and SME AI adoption. That focus is what wins.",color:"#7C9FFF"},
        ].map((p,i)=><Card key={i} style={{borderTop:`2px solid ${p.color}`,marginBottom:0}}>
          <div style={{fontSize:12,fontWeight:700,color:p.color,marginBottom:6}}>{p.t}</div>
          <div style={{fontSize:11,color:"#7070A0",lineHeight:1.5}}>{p.d}</div>
        </Card>)}
      </div>
    </Card>

    <SubTitle>Organisational Readiness — The Pre-Grant Checklist</SubTitle>
    {[
      ["CRA Registered Charity Status","Unlocks OTF, Canadian Heritage, most foundation grants","Priority 1 — confirm or start application now"],
      ["Published Annual Impact Report","Single most-read document by every funder","Build now using Trailblazer cohort data"],
      ["Board Page with Bios on Website","Funders verify 2/3 Black leadership requirement","One afternoon to write, one hour to post"],
      ["Reviewed Financial Statements","Required for grants above $50K","Engage CPA this year even without active grant"],
      ["Theory of Change (1 page)","Spine of every application — prevents re-explaining from scratch","Draft based on SOS research"],
      ["McMaster Letter of Support","Worth more than 3 paragraphs of program description","Formalise when LOI is signed"],
      ["Organisational Policies","Accessibility, Anti-Harassment, Conflict of Interest, Privacy, EDI","One board meeting to adopt; Black Builders Network provides templates"],
    ].map(([item,why,action],i)=><div key={i} style={{display:"grid",gridTemplateColumns:"1.5fr 1.5fr 1.5fr",gap:0,background:i%2===0?"#111":"transparent",borderBottom:"1px solid #1a1a1a",padding:"8px 0"}}>
      <div style={{fontSize:12,color:"#DDD",fontWeight:600,paddingLeft:4}}>{item}</div>
      <div style={{fontSize:12,color:M,paddingLeft:4}}>{why}</div>
      <div style={{fontSize:12,color:G,fontStyle:"italic",paddingLeft:4}}>{action}</div>
    </div>)}
  </div>;
}

function Programs() {
  const [showFindings, setShowFindings] = React.useState(false);
  return <div>
    <SectionTitle>Program Strategy</SectionTitle>
    <Body>BLKOWNED should not run one program. It should run a four-rung ladder where each rung serves a different level of commitment and readiness, feeds entrepreneurs upward into deeper engagement, and has its own funding profile.</Body>

    <Card style={{background:"linear-gradient(135deg,#0D0D0D,#12122A)",border:"1px solid #2a2a4a"}}>
      <div style={{fontSize:10,color:"#7C9FFF",fontWeight:700,letterSpacing:2,marginBottom:6}}>THE EVIDENCE BASE</div>
      <div style={{fontSize:14,fontWeight:700,color:"#EEE",marginBottom:6}}>MEB x BLK OWNED SOS Program — Zhuoma Yongci, McLean Centre for Collaborative Discovery, April 2026</div>
      <Body>The Trailblazer Residency model is not theoretical. It is grounded in primary research: 11 semi-structured interviews with Black entrepreneurs connected to BLKOWNED, conducted February–April 2026. This is the strongest evidence base of any Black entrepreneurship program in southwestern Ontario — and it is fundable evidence, not anecdote.</Body>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:12}}>
        {[
          {val:"11",label:"Entrepreneur interviews"},
          {val:"8 of 11",label:"Already using AI tools ad hoc"},
          {val:"#1 gap",label:"Structured mentorship access"},
          {val:"5 of 11",label:"Named sales/client acquisition as top challenge"},
        ].map((s,i)=><div key={i} style={{background:"#1a1a2a",borderRadius:8,padding:"10px 10px",textAlign:"center",border:"1px solid #2a2a3a"}}>
          <div style={{fontSize:16,fontWeight:800,color:"#7C9FFF"}}>{s.val}</div>
          <div style={{fontSize:10,color:"#555",marginTop:3}}>{s.label}</div>
        </div>)}
      </div>
      <button onClick={()=>setShowFindings(!showFindings)} style={{background:"transparent",border:"1px solid #2a2a4a",color:"#7C9FFF",fontSize:11,padding:"6px 14px",borderRadius:6,cursor:"pointer"}}>
        {showFindings?"Hide key findings":"Show key findings from 11 interviews"}
      </button>
      {showFindings && <div style={{marginTop:12}}>
        {[
          ["Mentorship is the primary gap","Access to structured, practical mentorship was the most significant unmet need across all 11 interviews. Entrepreneurs are using Google and ChatGPT to fill a gap that should be served by trusted, experienced mentors."],
          ["Sales, growth, and operations are the highest priorities","Client acquisition and sales (5 of 11), operations and scaling (5 of 11), and funding access (3 of 11) are the pressing pressures. These directly inform the Residency's mentorship categories."],
          ["AI tools are already in use — but unstructured","8 of 11 entrepreneurs already use AI tools (primarily ChatGPT) for writing, research, and brainstorming. The Residency adds value by integrating AI intentionally — not introducing it cold."],
          ["Earlier mentor access would have changed trajectories","Marvel Ekwurib, Newton & Lecoles, Abiola Sulaiman, and Caleb each said directly that earlier mentor access would have changed their path. This validates the residency over the workshop model."],
        ].map(([t,d],i)=><div key={i} style={{background:"#12121A",borderRadius:8,padding:"10px 12px",marginBottom:6,borderLeft:"2px solid #7C9FFF"}}>
          <div style={{fontSize:12,fontWeight:700,color:"#CCC",marginBottom:3}}>{t}</div>
          <div style={{fontSize:11,color:"#666",lineHeight:1.5}}>{d}</div>
        </div>)}
        <div style={{fontSize:11,color:"#555",fontStyle:"italic",marginTop:8}}>Source: MEB x BLK OWNED SOS Program Project Report, Zhuoma Yongci, April 30, 2026. Full report available on request.</div>
      </div>}
    </Card>

    <SubTitle>The Three-Pillar Architecture — SOS Framework</SubTitle>
    <Body>The Trailblazer Residency is built on the Three-Pillar SOS Framework developed through the MEB research. The pillars are sequenced deliberately: human mentorship first, AI in service of the program, and a research-based AI assistant only after sufficient real community data exists. This sequencing is both the right program design AND the strongest "responsible AI" story available for AI for All funding.</Body>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
      {[
        {n:"Pillar 1",t:"AI-Enabled Intake",phase:"Phase 1 — Now",color:"#4CAF50",items:["Automates new entrepreneur intake and assessment","Generates mentor-ready summary of each resident's needs and stage","Reduces admin burden on Ashleigh's team","Enables faster, more consistent onboarding at scale"]},
        {n:"Pillar 2",t:"Human-Led Mentorship",phase:"Phase 2 — Core Impact",color:"#C9A84C",items:["Discipline-specific mentors: sales, operations, finance, AI tools","Hands-on support paired with active skill transfer","Flexible and frequent — not one-time workshops","Tailored by intake insights from Pillar 1"]},
        {n:"Pillar 3",t:"Research-Based AI Assistant",phase:"Phase 3 — Long-Term (build after 20–25 interviews)",color:"#7C9FFF",items:["Built only after sufficient real entrepreneur data exists","Analyzes mentorship patterns and recurring challenges","24/7 AI assistant grounded in community evidence","Generates institutional knowledge for future cohorts"]},
      ].map((p,i)=><div key={i} style={{background:"#141414",border:`1px solid #222`,borderTop:`3px solid ${p.color}`,borderRadius:12,padding:16}}>
        <div style={{fontSize:10,color:p.color,letterSpacing:1,fontWeight:700,marginBottom:2}}>{p.n}</div>
        <div style={{fontSize:14,fontWeight:700,color:"#EEE",marginBottom:2}}>{p.t}</div>
        <div style={{fontSize:10,color:"#555",marginBottom:10,fontStyle:"italic"}}>{p.phase}</div>
        {p.items.map((it,j)=><Bullet key={j}>{it}</Bullet>)}
      </div>)}
    </div>
    <Card style={{borderLeft:"2px solid #7C9FFF",background:"#111"}}>
      <div style={{fontSize:11,fontWeight:700,color:"#7C9FFF",marginBottom:4}}>DATA NOTE — PILLAR 3</div>
      <div style={{fontSize:12,color:"#666",lineHeight:1.5}}>The SOS report is clear: Pillar 3 should not be built until the interview sample reaches 20–25 entrepreneurs, ensuring balanced representation across all business stages. The current 11-interview dataset (5 early-stage, 6 growth/scaling) is the foundation — continued data collection is essential before AI assistant development begins. This responsible sequencing is a grant differentiator, not a weakness.</div>
    </Card>

    <SubTitle>The Narrative Adjustment for AI for All Funding</SubTitle>
    <Card style={{background:"linear-gradient(135deg,#0D0D0D,#1a1a0D)",border:"1px solid #3a3a20"}}>
      <Body>The SOS framework deliberately de-centres AI — the right call for designing a good mentorship program. For AI for All funding, the narrative re-balances: AI literacy and responsible adoption move to the front, with the human-centred design repositioned as our trust differentiator rather than the headline. Same program, re-weighted story. This is not spin — it is the difference between a program that describes itself accurately to funders versus one that undersells its AI integration.</Body>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div style={{background:"#1a1a0D",borderRadius:8,padding:12,border:"1px solid #2a2a14"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#888",marginBottom:6}}>SOS REPORT FRAMING</div>
